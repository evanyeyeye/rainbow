name: Publish to PyPI

# Publishes rainbow-api to PyPI whenever a version tag (e.g. v1.0.12) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens are stored in the repo.
#
# Release flow:
#   1. Bump `version` in pyproject.toml and merge to main.
#   2. git tag -a v1.0.12 -m "Release 1.0.12" && git push origin v1.0.12
#   3. This workflow builds the sdist + wheel and uploads them to PyPI.
#
# One-time setup on PyPI (Account -> Publishing -> Add a pending publisher):
#   Owner:            evanyeyeye
#   Repository name:  rainbow
#   Workflow name:    publish.yml
#   Environment name: pypi

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        # The compiled accelerator is optional: cibuildwheel produces a
        # binary wheel per platform so users get the fast path with no
        # compiler. The sdist (built below) still installs everywhere and
        # falls back to pure Python if it can't compile.

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Check sdist
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          # Gather every wheel + the sdist into dist/.
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
